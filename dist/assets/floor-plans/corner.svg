  <rect x="24" y="24" width="56" height="72" rx="2" fill="none" stroke="#ccc" stroke-width="1"/>
  <rect x="24" y="172" width="56" height="72" rx="2" fill="none" stroke="#ccc" stroke-width="1"/>
  <text x="470" y="312" text-anchor="end" font-family="Inter, sans-serif" font-size="8" fill="#bbb">12.00 × 8.00 m · ~96 m˛</text>
